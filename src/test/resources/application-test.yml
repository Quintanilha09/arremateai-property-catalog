server:
  port: 0

spring:
  application:
    name: arremateai-property-catalog-test
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.arremateai.propertycatalog: WARN
    org.hibernate.SQL: WARN
