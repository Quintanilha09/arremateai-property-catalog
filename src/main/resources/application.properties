server.port=8082
spring.application.name=arremateai-property-catalog

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/property_catalog_db
spring.datasource.username=arremateai
spring.datasource.password=arremateai123
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.arremateai.propertycatalog=DEBUG
logging.level.org.hibernate.SQL=DEBUG
