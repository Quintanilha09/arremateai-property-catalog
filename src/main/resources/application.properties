# Server
server.port=${SERVER_PORT:8082}
spring.application.name=arremateai-property-catalog

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:property_catalog_db}
spring.datasource.username=${DB_USERNAME:arremateai}
spring.datasource.password=${DB_PASSWORD:arremateai123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.com.arremateai.propertycatalog=${LOG_LEVEL_APP:INFO}
logging.level.org.hibernate.SQL=WARN
