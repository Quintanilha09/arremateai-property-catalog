# Server
server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: arremateai-property-catalog

  # Database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:property_catalog_db}
    username: ${DB_USERNAME:arremateai}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Logging
logging:
  level:
    com.arremateai.propertycatalog: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: WARN
